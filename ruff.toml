target-version = "py312"
line-length = 110
exclude = [
    ".venv",
    "build",
    "dist",
    "notebooks",
]

[lint]
select = ["E", "F", "W", "I", "B", "UP", "N", "SIM", "RUF"]
ignore = [
    "E501",  # we enforce line length manually where it matters
    "N812",  # allow single-letter capital aliases (e.g. Q)
]

[lint.per-file-ignores]
"tests/**" = ["B", "N802", "N803"]
