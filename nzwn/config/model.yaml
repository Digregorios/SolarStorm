# NZWN model configuration
# Frozen with REQ-MOD-6 (determinism), REQ-MOD-4 (calibration), design 8.1.1 (tau), design 4.5.2 (NWP selection).

seeds:
  python_random: 42
  numpy: 42
  lightgbm:
    seed: 42
    bagging_seed: 42
    feature_fraction_seed: 42
    drop_seed: 42

# softmax band-aware (design 8.1.1)
prob_dist:
  tau: 0.5
  mode: linear           # 'linear' | 'quadratic'
  loss_alpha: 1.0

# Conformal calibration (Phase 5)
conformal:
  per_cp_window_days: 90
  seasonal_window_months: 12
  min_n_per_bucket: 200

# Confidence score (Phase 5)
confidence:
  min_confidence_default: 0.55
  # Phase 5 closed NOT READY (2026-05-30): IC80/confidence calibration never passed
  # the REQ-AUD-5 het gate (v1.0/A1/A3/P/P'/D1/S all failed). Until Phase 5 is green,
  # the confidence stay-out MUST NOT gate trades in production; it stays DIAGNOSTIC
  # only (CP-stratified report, esp. 22Z/23Z). Flip to true only when Phase 5 is green.
  gate_enabled_in_production: false

# Online AR (Phase 6 - off by default)
ar_online:
  enabled: false
  order: 7

# NWP selection rule (design 4.5.2 + 4.5.2.1 anchor v1.1 + contracts/nwp_source.md v1.1).
nwp:
  enabled: false                # Phase 4 toggle
  source_version: "1.1"         # NWP_SOURCE_VERSION (1.1: max-of-trajectory anchor, design 4.5.2.1)
  models:                       # 2-model launch set; expand to 4 only with version bump
    - id: "ecmwf_ifs_hres"
      provider: "ecmwf"
      open_meteo_id: "ecmwf_ifs"
      lead_step_h: 1
      cycle_h: 6
      archive_start: "2017-01-01"
    - id: "ncep_gfs_global"
      provider: "noaa_ncep"
      open_meteo_id: "gfs_global"
      lead_step_h: 1
      cycle_h: 6
      archive_start: "2021-03-23"
  safety_margin_minutes: 60     # bumped from design default 30 per Open-Meteo latency
  endpoint_historical: "historical-forecast-api.open-meteo.com"
  endpoint_single_runs: "single-runs-api.open-meteo.com"
  variables:
    - "temperature_2m"
    - "wind_speed_10m"
    - "wind_direction_10m"
    - "pressure_msl"
    - "cloud_cover"
    - "precipitation"

threading:
  omp_num_threads: 1         # determinism in CI
