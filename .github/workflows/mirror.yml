name: Mirror to Organization

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  mirror:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup SSH agent
        uses: webfactory/ssh-agent@v0.9.0
        with:
          ssh-private-key: ${{ secrets.ORG_SSH_KEY }}

      - name: Push to Digregorios/SolarStorm (SSH)
        run: |
          git remote add org git@github.com:Digregorios/SolarStorm.git
          git push -f org main
