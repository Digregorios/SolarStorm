name: ci

on:
  push:
    branches: [main]
  pull_request:

jobs:
  lint-and-test:
    runs-on: ubuntu-latest
    env:
      OMP_NUM_THREADS: 1
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install
        run: |
          python -m pip install -U pip
          python -m pip install -e ".[dev]"
      - name: Reverse-import guard
        run: python tools/reverse_import_guard.py .
      - name: ASCII guard
        run: python tools/ascii_guard.py .
      - name: Ruff lint
        run: ruff check .
      - name: Mypy
        run: mypy core nzwn
        continue-on-error: true
      - name: Pytest
        run: pytest -q
